<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SnapStack</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="eyebrow">NAS photo organizer</p>
        <h1>SnapStack</h1>
        <p>
          連写や似た写真をまとめ、各グループから残す候補を最大{{ recommendation_count }}枚おすすめします。
          画像はローカルで解析し、初期版ではファイル削除は行いません。
        </p>
      </header>

      <section class="panel">
        <div class="panel-heading">
          <h2>対象フォルダ</h2>
          <button id="scan-button" type="button">選択したフォルダをスキャン</button>
        </div>

        {% if photo_roots %}
          <div class="roots">
            {% for root in photo_roots %}
              <label class="root-card">
                <input type="checkbox" name="root" value="{{ root.name }}" checked />
                <span>
                  <strong>{{ root.name }}</strong>
                  <small>{{ root.path }}</small>
                </span>
              </label>
            {% endfor %}
          </div>
        {% else %}
          <p class="empty">
            写真フォルダが未設定です。<code>config/snapstack.yml</code>または
            <code>SNAPSTACK_PHOTO_ROOTS</code>で複数ルートを設定してください。
          </p>
        {% endif %}
      </section>

      <section id="status" class="status" hidden></section>
      <section id="results" class="results"></section>
    </main>

    <template id="group-template">
      <article class="group">
        <div class="group-header">
          <div>
            <h2></h2>
            <p class="group-meta"></p>
          </div>
          <span class="badge"></span>
        </div>
        <h3>おすすめ</h3>
        <div class="recommended-grid"></div>
        <details>
          <summary>グループ内の全画像を表示</summary>
          <div class="photo-grid"></div>
        </details>
      </article>
    </template>

    <template id="photo-template">
      <figure class="photo-card">
        <img alt="" loading="lazy" />
        <figcaption>
          <strong></strong>
          <span></span>
          <small></small>
        </figcaption>
      </figure>
    </template>

    <script>
      const scanButton = document.querySelector("#scan-button");
      const statusBox = document.querySelector("#status");
      const results = document.querySelector("#results");
      const groupTemplate = document.querySelector("#group-template");
      const photoTemplate = document.querySelector("#photo-template");

      scanButton?.addEventListener("click", async () => {
        const rootNames = [...document.querySelectorAll("input[name='root']:checked")].map((input) => input.value);
        statusBox.hidden = false;
        statusBox.textContent = "スキャン中です。写真枚数が多い場合は時間がかかります...";
        results.innerHTML = "";
        scanButton.disabled = true;

        try {
          const response = await fetch("/api/scan", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ root_names: rootNames }),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || "Scan failed");
          }
          renderResults(payload);
        } catch (error) {
          statusBox.textContent = `エラー: ${error.message}`;
        } finally {
          scanButton.disabled = false;
        }
      });

      function renderResults(payload) {
        const summary = payload.summary;
        statusBox.textContent =
          `${summary.scanned_files}件を確認、${summary.analyzed_files}件を解析、` +
          `${summary.cached_files}件はキャッシュを使用。${payload.groups.length}グループを検出しました。`;

        if (payload.groups.length === 0) {
          results.innerHTML = "<p class='empty'>類似グループは見つかりませんでした。</p>";
          return;
        }

        for (const group of payload.groups) {
          const node = groupTemplate.content.cloneNode(true);
          node.querySelector("h2").textContent = `${group.count}枚の類似グループ`;
          node.querySelector(".group-meta").textContent = groupMeta(group);
          node.querySelector(".badge").textContent = group.roots.join(", ");

          const recommendedGrid = node.querySelector(".recommended-grid");
          for (const photo of group.recommended) {
            recommendedGrid.appendChild(renderPhoto(photo, true));
          }

          const photoGrid = node.querySelector(".photo-grid");
          for (const photo of group.photos) {
            photoGrid.appendChild(renderPhoto(photo, false));
          }

          results.appendChild(node);
        }
      }

      function renderPhoto(photo, recommended) {
        const node = photoTemplate.content.cloneNode(true);
        const image = node.querySelector("img");
        image.src = photo.thumbnail_url;
        image.alt = photo.basename;
        node.querySelector("strong").textContent = photo.basename;
        node.querySelector("span").textContent = `総合スコア ${Math.round(photo.score * 100)} / 100`;
        node.querySelector("small").textContent =
          `${photo.width}x${photo.height} / ${photo.captured_at || "撮影日時なし"}`;
        if (recommended) {
          node.querySelector(".photo-card").classList.add("is-recommended");
        }
        return node;
      }

      function groupMeta(group) {
        const parts = [];
        if (group.captured_start) {
          parts.push(`${group.captured_start} - ${group.captured_end}`);
        }
        parts.push(`おすすめ ${group.recommended.length}枚`);
        return parts.join(" / ");
      }
    </script>
  </body>
</html>
